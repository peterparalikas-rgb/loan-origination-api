type: http
name: Submit a new loan application
url: '{{baseUrl}}/applications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "applicantId": "app_9876543210",
      "productType": "personal_loan",
      "requestedAmount": 25000,
      "termMonths": 36,
      "purpose": "debt_consolidation",
      "annualIncome": 85000,
      "employmentStatus": "full_time"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicantId": "string",
            "productType": "string",
            "requestedAmount": 7948.577872371796,
            "termMonths": 4734,
            "status": "denied",
            "createdAt": "2018-01-14T02:52:57.805Z",
            "updatedAt": "2021-10-23T04:59:45.732Z",
            "underwritingResult": {
              "applicationId": "string",
              "status": "pending",
              "decision": "referred_to_manual",
              "riskScore": 92,
              "evaluatedAt": "1952-03-16T15:04:29.648Z"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application created successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid application data
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Duplicate active application exists
